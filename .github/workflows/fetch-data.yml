name: Fetch HEM data (SYKE + FMI)

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch SYKE + FMI data
        run: python scripts/fetch_data.py
        continue-on-error: true

      - name: Show cache contents
        run: |
          echo "=== data/cache/ ==="
          ls -la data/cache/ || echo "(empty)"
          echo "=== syke.json preview ==="
          cat data/cache/syke.json 2>/dev/null | head -c 500 || echo "(missing)"
          echo "=== fmi.json preview ==="
          cat data/cache/fmi.json 2>/dev/null | head -c 500 || echo "(missing)"

      - name: Commit cache
        run: |
          git config user.name "ACI-HEM-bot"
          git config user.email "action@github.com"
          git add data/cache/
          git diff --staged --quiet || git commit -m "auto: päivitä HEM-datacache [skip ci]"
          git push
