name: Fetch HEM data (SYKE + FMI)

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch SYKE + FMI data
        run: python scripts/fetch_data.py 2>&1 | tee data/cache/fetch_log.txt
        continue-on-error: true

      - name: Fetch Muonionjoki Muonio
        run: python scripts/fetch_muonio.py 2>&1 | tee -a data/cache/fetch_log.txt
        continue-on-error: true

      - name: Commit cache
        run: |
          git config user.name "ACI-HEM-bot"
          git config user.email "action@github.com"
          git add data/cache/
          git diff --staged --quiet && echo "Ei muutoksia" && exit 0
          git commit -m "auto: päivitä HEM-datacache [skip ci]"
          git pull --rebase=false -s ours origin main || true
          git push origin main
