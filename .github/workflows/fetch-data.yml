name: Fetch HEM data (SYKE + FMI)

on:
  schedule:
    - cron: '0 5 * * *'   # päivittäin klo 5 UTC
  workflow_dispatch:        # manuaalinen trigger

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch SYKE + FMI data
        run: python scripts/fetch_data.py

      - name: Commit cache
        run: |
          git config user.name "ACI-HEM-bot"
          git config user.email "action@github.com"
          git add data/cache/
          git diff --staged --quiet || git commit -m "auto: päivitä HEM-datacache [skip ci]"
          git push
